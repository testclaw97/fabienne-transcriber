<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Transkription</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    h1 { font-size: 1.6rem; font-weight: 600; margin-bottom: 6px; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 28px; }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 24px 28px;
      width: 100%;
      max-width: 720px;
      margin-bottom: 16px;
    }

    /* ── Breadcrumb ── */
    .breadcrumb {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 16px;
      font-size: 0.85rem;
    }
    .breadcrumb-item { color: #5b5ef4; cursor: pointer; font-weight: 500; }
    .breadcrumb-item:hover { text-decoration: underline; }
    .breadcrumb-item.current { color: #333; cursor: default; font-weight: 600; }
    .breadcrumb-item.current:hover { text-decoration: none; }
    .breadcrumb-sep { color: #bbb; }

    /* ── File list ── */
    .file-list { list-style: none; }
    .file-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .file-list li:hover { background: #f5f5ff; }
    .file-list li + li { border-top: 1px solid #f0f0f0; }
    .item-icon { font-size: 1.1rem; flex-shrink: 0; }
    .item-name { flex: 1; font-size: 0.9rem; }
    .item-name.folder { font-weight: 500; }

    .btn-transcribe {
      padding: 6px 14px;
      background: #5b5ef4;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-transcribe:hover { background: #4547d4; }
    .btn-transcribe:disabled { opacity: 0.5; cursor: not-allowed; }

    .empty-msg { color: #999; font-size: 0.875rem; padding: 16px 8px; text-align: center; }
    .loading-msg { color: #888; font-size: 0.875rem; padding: 16px 8px; text-align: center; }

    /* ── Progress ── */
    #progress-section { display: none; margin-top: 4px; }
    .selected-file {
      font-size: 0.82rem;
      color: #555;
      margin-bottom: 12px;
      padding: 8px 12px;
      background: #f8f8ff;
      border-radius: 6px;
      border-left: 3px solid #5b5ef4;
    }
    .steps { display: flex; gap: 0; margin-bottom: 8px; }
    .step { flex: 1; text-align: center; font-size: 0.75rem; color: #bbb; padding-bottom: 4px; }
    .step.active { color: #5b5ef4; font-weight: 600; }
    .step.done { color: #22c55e; }
    .progress-bar-bg { height: 6px; background: #eee; border-radius: 99px; overflow: hidden; margin-bottom: 10px; }
    .progress-bar-fill { height: 100%; background: #5b5ef4; border-radius: 99px; transition: width 0.5s ease; width: 0%; }
    .progress-message { font-size: 0.85rem; color: #666; text-align: center; }

    /* ── Error ── */
    #error-box {
      display: none;
      margin-top: 16px;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.875rem;
    }

    /* ── Result: two-panel editor ── */
    #result-section {
      display: none;
      width: 100%;
      max-width: 1200px;
      margin-bottom: 16px;
    }

    .editor-layout {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    /* Left: video panel */
    .video-panel {
      width: 360px;
      flex-shrink: 0;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
      position: sticky;
      top: 20px;
    }
    .video-panel iframe {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      border: none;
      background: #000;
    }
    .video-title {
      padding: 10px 12px;
      font-size: 0.78rem;
      color: #555;
      border-top: 1px solid #f0f0f0;
      line-height: 1.4;
    }

    /* Right: transcript panel */
    .transcript-panel {
      flex: 1;
      min-width: 0;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 20px 24px;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .result-header h2 { font-size: 1rem; font-weight: 600; }

    .toolbar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    button.btn-tool {
      padding: 6px 12px;
      background: #f0f0f0;
      color: #333;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    button.btn-tool:hover { background: #e0e0e0; }
    button.btn-tool.active { background: #5b5ef4; color: #fff; }

    button.btn-save {
      padding: 6px 12px;
      background: #22c55e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    button.btn-save:hover { background: #16a34a; }

    .toolbar-sep {
      width: 1px;
      height: 20px;
      background: #ddd;
      flex-shrink: 0;
    }

    /* Transcript table */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      font-size: 0.75rem;
      color: #888;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0 10px 8px;
    }
    td {
      padding: 6px 10px;
      border-top: 1px solid #f0f0f0;
      vertical-align: top;
    }
    .ts-cell {
      width: 68px;
      color: #5b5ef4;
      font-size: 0.85rem;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      white-space: nowrap;
      padding-top: 10px;
      cursor: pointer;
    }
    .ts-cell:hover { color: #4547d4; text-decoration: underline; }
    .text-cell { font-size: 0.9rem; line-height: 1.5; }
    .text-cell[contenteditable="true"] {
      outline: none;
      border-radius: 4px;
      padding: 4px 6px;
      transition: background 0.15s;
    }
    .text-cell[contenteditable="true"]:focus { background: #f0f0ff; }

    .del-cell { width: 32px; padding: 6px 4px; text-align: center; }
    .btn-delete {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.12s, background 0.12s;
    }
    .btn-delete:hover { color: #ef4444; background: #fef2f2; }

    /* Timestamps hidden */
    .timestamps-hidden .ts-col { display: none; }
    .timestamps-hidden .ts-cell { display: none; }

    /* Font sizes */
    .font-sm .text-cell { font-size: 0.78rem; }
    .font-md .text-cell { font-size: 0.9rem; }
    .font-lg .text-cell { font-size: 1.05rem; }
    .font-xl .text-cell { font-size: 1.2rem; }

    /* Toast */
    .copy-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a;
      color: #fff;
      padding: 8px 18px;
      border-radius: 99px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Responsive: stack on small screens */
    @media (max-width: 800px) {
      .editor-layout { flex-direction: column; }
      .video-panel { width: 100%; position: static; }
      .toolbar { gap: 4px; }
      .toolbar-sep { display: none; }
      .result-header { flex-direction: column; gap: 10px; }
    }

    @media (max-width: 480px) {
      body { padding: 16px 10px 60px; }
      h1 { font-size: 1.3rem; }
      .card { padding: 16px; }
      .transcript-panel { padding: 14px 12px; }
      button.btn-tool { padding: 5px 8px; font-size: 0.75rem; }
      button.btn-save { padding: 5px 10px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

  <h1>Video Transkription</h1>
  <p class="subtitle">Video auswählen → Transkript erhalten</p>

  <!-- File browser -->
  <div class="card">
    <div class="breadcrumb" id="breadcrumb"></div>
    <ul class="file-list" id="file-list">
      <li><span class="loading-msg">Lade Ordner…</span></li>
    </ul>
  </div>

  <!-- Progress -->
  <div class="card" id="progress-section">
    <div class="selected-file" id="selected-file-name"></div>
    <div class="steps">
      <div class="step" data-step="downloading">Download</div>
      <div class="step" data-step="extracting">Audio</div>
      <div class="step" data-step="uploading">Upload</div>
      <div class="step" data-step="transcribing">Transkription</div>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="progress-message" id="progress-message">Starte…</div>
    <div id="error-box"></div>
  </div>

  <!-- Result: two-panel editor -->
  <div id="result-section">
    <div class="editor-layout">

      <!-- Left: video preview -->
      <div class="video-panel">
        <iframe id="video-preview" src="" allowfullscreen></iframe>
        <div class="video-title" id="video-title"></div>
      </div>

      <!-- Right: transcript editor -->
      <div class="transcript-panel" id="transcript-table-wrap">
        <div class="result-header">
          <h2>Transkript</h2>
          <div class="toolbar">
            <button class="btn-tool active" id="ts-toggle-btn" onclick="toggleTimestamps()">Zeitstempel</button>
            <div class="toolbar-sep"></div>
            <button class="btn-tool" onclick="setFont('sm')">A−</button>
            <button class="btn-tool active" id="font-md-btn" onclick="setFont('md')">A</button>
            <button class="btn-tool" onclick="setFont('lg')">A+</button>
            <button class="btn-tool" onclick="setFont('xl')">A++</button>
            <div class="toolbar-sep"></div>
            <button class="btn-tool" onclick="copyAll()">Kopieren</button>
            <button class="btn-save" onclick="downloadTxt()">Notizen speichern</button>
          </div>
        </div>
        <table class="font-md" id="transcript-table">
          <thead>
            <tr>
              <th class="ts-col">Zeit</th>
              <th>Text</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="transcript-body"></tbody>
        </table>
      </div>

    </div>
  </div>

  <div class="copy-toast" id="copy-toast">Kopiert!</div>

  <script>
    let transcriptData = [];
    let activeJobId = null;
    let activeFileId = null;
    let activeFileName = '';
    let showTimestamps = true;
    let currentFont = 'md';

    // ── Breadcrumb state ──────────────────────────────────────────────────────
    let navStack = [];

    // ── Browse ────────────────────────────────────────────────────────────────
    async function browse(folderId, folderName) {
      if (folderId === null) {
        navStack = [{ id: null, name: 'Alle Ordner' }];
      } else {
        const idx = navStack.findIndex(n => n.id === folderId);
        if (idx >= 0) {
          navStack = navStack.slice(0, idx + 1);
        } else {
          navStack.push({ id: folderId, name: folderName });
        }
      }

      renderBreadcrumb();
      document.getElementById('file-list').innerHTML =
        '<li><span class="loading-msg">Lade…</span></li>';

      const query = folderId ? `?folderId=${folderId}` : '';
      try {
        const res = await fetch(`/api/browse${query}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        renderFileList(data.items);
      } catch (err) {
        document.getElementById('file-list').innerHTML =
          `<li><span class="empty-msg">Fehler: ${escapeHtml(err.message)}</span></li>`;
      }
    }

    function renderBreadcrumb() {
      const bc = document.getElementById('breadcrumb');
      bc.innerHTML = '';
      navStack.forEach((item, i) => {
        const span = document.createElement('span');
        span.className = 'breadcrumb-item' + (i === navStack.length - 1 ? ' current' : '');
        span.textContent = item.name;
        if (i < navStack.length - 1) {
          span.onclick = () => browse(item.id, item.name);
        }
        bc.appendChild(span);
        if (i < navStack.length - 1) {
          const sep = document.createElement('span');
          sep.className = 'breadcrumb-sep';
          sep.textContent = ' › ';
          bc.appendChild(sep);
        }
      });
    }

    function renderFileList(items) {
      const ul = document.getElementById('file-list');
      ul.innerHTML = '';

      if (items.length === 0) {
        ul.innerHTML = '<li><span class="empty-msg">Keine Videos in diesem Ordner.</span></li>';
        return;
      }

      items.forEach(item => {
        const li = document.createElement('li');

        const icon = document.createElement('span');
        icon.className = 'item-icon';
        icon.textContent = item.type === 'folder' ? '📁' : '🎬';

        const name = document.createElement('span');
        name.className = 'item-name' + (item.type === 'folder' ? ' folder' : '');
        name.textContent = item.name;

        li.appendChild(icon);
        li.appendChild(name);

        if (item.type === 'folder') {
          li.onclick = () => browse(item.id, item.name);
        } else {
          const btn = document.createElement('button');
          btn.className = 'btn-transcribe';
          btn.textContent = 'Transkribieren';
          btn.dataset.fileId = item.id;
          btn.dataset.fileName = item.name;
          btn.onclick = (e) => {
            e.stopPropagation();
            startTranscription(item.id, item.name);
          };
          li.appendChild(btn);
          li.onclick = () => startTranscription(item.id, item.name);
        }

        ul.appendChild(li);
      });
    }

    // ── Transcription ─────────────────────────────────────────────────────────
    async function startTranscription(fileId, fileName) {
      if (activeJobId) return;

      activeFileId = fileId;
      activeFileName = fileName;
      document.getElementById('selected-file-name').textContent = '🎬 ' + fileName;
      document.getElementById('progress-section').style.display = 'block';
      document.getElementById('result-section').style.display = 'none';
      document.getElementById('error-box').style.display = 'none';
      transcriptData = [];
      setProgress('downloading', 0, 'Starte…');

      document.querySelectorAll('.btn-transcribe').forEach(b => b.disabled = true);

      const driveUrl = `https://drive.google.com/file/d/${fileId}/view`;

      let jobId;
      try {
        const res = await fetch('/transcribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: driveUrl }),
        });
        const data = await res.json();
        if (!res.ok) { showError(data.error || 'Unbekannter Fehler'); return; }
        jobId = data.jobId;
        activeJobId = jobId;
      } catch (err) {
        showError('Server nicht erreichbar.');
        return;
      }

      const evtSource = new EventSource(`/progress/${jobId}`);

      evtSource.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'progress') setProgress(msg.step, msg.pct, msg.message);
        if (msg.type === 'done') {
          evtSource.close();
          activeJobId = null;
          document.querySelectorAll('.btn-transcribe').forEach(b => b.disabled = false);
          setProgress('transcribing', 100, 'Fertig!');
          renderTranscript(msg.transcript);
        }
        if (msg.type === 'error') {
          evtSource.close();
          activeJobId = null;
          document.querySelectorAll('.btn-transcribe').forEach(b => b.disabled = false);
          showError(msg.error);
        }
      };

      evtSource.onerror = () => {
        evtSource.close();
        activeJobId = null;
        document.querySelectorAll('.btn-transcribe').forEach(b => b.disabled = false);
        showError('Verbindung zum Server unterbrochen.');
      };
    }

    function setProgress(step, pct, message) {
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-message').textContent = message;
      const stepOrder = ['downloading', 'extracting', 'uploading', 'transcribing'];
      const currentIdx = stepOrder.indexOf(step);
      document.querySelectorAll('.step').forEach((el, i) => {
        el.classList.remove('active', 'done');
        if (i < currentIdx) el.classList.add('done');
        else if (i === currentIdx) el.classList.add('active');
      });
    }

    function showError(msg) {
      const box = document.getElementById('error-box');
      box.textContent = 'Fehler: ' + msg;
      box.style.display = 'block';
    }

    function renderTranscript(data) {
      transcriptData = data;

      // Set video preview
      document.getElementById('video-preview').src =
        `https://drive.google.com/file/d/${activeFileId}/preview`;
      document.getElementById('video-title').textContent = activeFileName;

      const tbody = document.getElementById('transcript-body');
      tbody.innerHTML = '';

      data.forEach((row, i) => {
        appendRow(row, i, tbody);
      });

      document.getElementById('result-section').style.display = 'block';
      document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function appendRow(row, i, tbody) {
      const tr = document.createElement('tr');
      tr.dataset.index = i;

      const tsCell = document.createElement('td');
      tsCell.className = 'ts-cell';
      tsCell.textContent = row.timestamp;

      const textCell = document.createElement('td');
      textCell.className = 'text-cell';
      textCell.contentEditable = 'true';
      textCell.textContent = row.text;
      textCell.oninput = () => { transcriptData[i].text = textCell.textContent; };

      const delCell = document.createElement('td');
      delCell.className = 'del-cell';
      const delBtn = document.createElement('button');
      delBtn.className = 'btn-delete';
      delBtn.textContent = '×';
      delBtn.title = 'Zeile löschen';
      delBtn.onclick = () => deleteRow(tr, i);
      delCell.appendChild(delBtn);

      tr.appendChild(tsCell);
      tr.appendChild(textCell);
      tr.appendChild(delCell);
      tbody.appendChild(tr);
    }

    function deleteRow(tr, index) {
      transcriptData[index] = null;
      tr.remove();
    }

    // ── Toolbar controls ──────────────────────────────────────────────────────
    function toggleTimestamps() {
      showTimestamps = !showTimestamps;
      const table = document.getElementById('transcript-table');
      table.classList.toggle('timestamps-hidden', !showTimestamps);
      const btn = document.getElementById('ts-toggle-btn');
      btn.classList.toggle('active', showTimestamps);
    }

    const fontSizes = ['sm', 'md', 'lg', 'xl'];
    function setFont(size) {
      const table = document.getElementById('transcript-table');
      fontSizes.forEach(s => table.classList.remove('font-' + s));
      table.classList.add('font-' + size);
      currentFont = size;
      document.querySelectorAll('.btn-tool').forEach(b => {
        if (b.id === 'ts-toggle-btn') return;
        b.classList.remove('active');
      });
      // find the button that matches
      const labels = { sm: 'A−', md: 'A', lg: 'A+', xl: 'A++' };
      document.querySelectorAll('.btn-tool').forEach(b => {
        if (b.textContent === labels[size]) b.classList.add('active');
      });
    }

    // ── Export ────────────────────────────────────────────────────────────────
    function buildFullText() {
      const rows = transcriptData.filter(r => r !== null);
      if (showTimestamps) {
        return rows.map(r => `[${r.timestamp}] ${r.text}`).join('\n');
      }
      return rows.map(r => r.text).join('\n');
    }

    async function copyAll() {
      await navigator.clipboard.writeText(buildFullText());
      const toast = document.getElementById('copy-toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function downloadTxt() {
      const blob = new Blob([buildFullText()], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = (activeFileName || 'transkript') + ' – Notizen.txt';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    browse(null, 'Alle Ordner');
  </script>
</body>
</html>
